<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ADK AI Agent | Translator</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 450px;
        }

        h2 {
            color: #1a73e8;
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f0fe;
            border-radius: 8px;
            display: none;
            color: #1967d2;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🌍 ADK AI Translator</h2>
        <textarea id="inputText" placeholder="Type text here..."></textarea>
        <input type="text" id="targetLang" value="Sinhala" placeholder="Target Language">
        <button onclick="translateText()">Translate</button>
        <div id="result" id="output"></div>
    </div>

    <script>
        async function translateText() {
            const text = document.getElementById('inputText').value;
            const target = document.getElementById('targetLang').value;
            const resultDiv = document.getElementById('result');

            resultDiv.style.display = "block";
            resultDiv.innerText = "AI is thinking...";

            try {
                // FORCE the full HTTPS URL to avoid any path confusion
                const response = await fetch('https://adk-translator-agent-640504291333.us-central1.run.app//translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        target: target
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server responded with ${response.status}`);
                }

                const data = await response.json();
                resultDiv.innerText = "Result: " + data.translated_text;
            } catch (err) {
                resultDiv.innerText = "Error: " + err.message;
                console.error("FULL ERROR DETAILS:", err);
            }
        }
    </script>
</body>

</html>
